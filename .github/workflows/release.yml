name: Unified Release

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Release channel to build and deploy"
        required: true
        default: "production"
        type: choice
        options:
          - staging
          - production
      release_version:
        description: "Marketing version / release label"
        required: true
        default: "0.1.0"
        type: string
  push:
    tags:
      - "release-*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  web_and_capgo:
    name: Web build + Capgo bundle
    runs-on: ubuntu-latest
    env:
      RELEASE_CHANNEL: ${{ inputs.release_channel || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build:web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_AUTH_REDIRECT_TO: ${{ secrets.VITE_SUPABASE_AUTH_REDIRECT_TO }}
          VITE_REVENUECAT_PUBLIC_API_KEY: ${{ secrets.VITE_REVENUECAT_PUBLIC_API_KEY }}
          VITE_REVENUECAT_WEB_API_KEY: ${{ secrets.VITE_REVENUECAT_WEB_API_KEY }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Upload Capgo bundle
        if: ${{ secrets.CAPGO_TOKEN != '' }}
        run: npx @capgo/cli@latest bundle upload --channel "${RELEASE_CHANNEL}" --apikey "${CAPGO_TOKEN}"
        env:
          CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}

  desktop:
    name: Desktop bundles
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-22.04
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri desktop app
        run: npm run build:desktop
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_AUTH_REDIRECT_TO: ${{ secrets.VITE_SUPABASE_AUTH_REDIRECT_TO }}
          VITE_REVENUECAT_PUBLIC_API_KEY: ${{ secrets.VITE_REVENUECAT_PUBLIC_API_KEY }}
          VITE_REVENUECAT_WEB_API_KEY: ${{ secrets.VITE_REVENUECAT_WEB_API_KEY }}

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.platform }}
          path: src-tauri/target/release/bundle

  android:
    name: Android Play pipeline
    runs-on: ubuntu-latest
    needs: web_and_capgo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: fastlane

      - name: Install dependencies
        run: npm ci

      - name: Build and sync Android project
        run: npm run build:mobile
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_AUTH_REDIRECT_TO: ${{ secrets.VITE_SUPABASE_AUTH_REDIRECT_TO }}
          VITE_REVENUECAT_PUBLIC_API_KEY: ${{ secrets.VITE_REVENUECAT_PUBLIC_API_KEY }}
          VITE_REVENUECAT_WEB_API_KEY: ${{ secrets.VITE_REVENUECAT_WEB_API_KEY }}

      - name: Run Fastlane Android lane
        working-directory: fastlane
        run: bundle exec fastlane android internal
        env:
          ANDROID_KEYSTORE_FILE_BASE64: ${{ secrets.ANDROID_KEYSTORE_FILE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PLAY_CONFIG_JSON: ${{ secrets.PLAY_CONFIG_JSON }}
          DEVELOPER_PACKAGE_NAME: ${{ secrets.DEVELOPER_PACKAGE_NAME }}

      - name: Upload Android bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-bundle
          path: android/app/build/outputs/bundle/release/*.aab

  ios:
    name: iOS App Store pipeline
    runs-on: macos-latest
    needs: web_and_capgo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: fastlane

      - name: Install dependencies
        run: npm ci

      - name: Build web + sync iOS
        run: npm run build:mobile && npx cap sync ios
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_AUTH_REDIRECT_TO: ${{ secrets.VITE_SUPABASE_AUTH_REDIRECT_TO }}
          VITE_REVENUECAT_PUBLIC_API_KEY: ${{ secrets.VITE_REVENUECAT_PUBLIC_API_KEY }}
          VITE_REVENUECAT_WEB_API_KEY: ${{ secrets.VITE_REVENUECAT_WEB_API_KEY }}

      - name: Run Fastlane iOS lane
        working-directory: fastlane
        run: bundle exec fastlane ios testflight
        env:
          APP_STORE_CONNECT_TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}
          BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_IDENTIFIER }}
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_KEY_CONTENT: ${{ secrets.APPLE_KEY_CONTENT }}
          APPLE_PROFILE_NAME: ${{ secrets.APPLE_PROFILE_NAME }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: App.ipa
