name: Deploy to Netlify (direct)

# Direct Netlify deploy. Bypasses the PersonalWebsite repo entirely.
#
# Required secrets:
#   NETLIFY_AUTH_TOKEN — https://app.netlify.com/user/applications
#   NETLIFY_SITE_ID    — Netlify dashboard → Site → Settings → General
#
# Optional secrets (read the WARNING below before setting):
#   VITE_API_URL, VITE_DEEPSEEK_API_KEY, VITE_OPENAI_API_KEY, VITE_GEMINI_API_KEY
#
# WARNING: VITE_*_API_KEY secrets bake into the public JS bundle. For a
# real public deployment, route LLM calls through the FastAPI backend
# (set VITE_API_URL only).

on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'BenKalish42/current-almanac'
    permissions:
      contents: read
    env:
      HAS_NETLIFY: ${{ secrets.NETLIFY_AUTH_TOKEN != '' && secrets.NETLIFY_SITE_ID != '' }}
    steps:
      - name: Pre-flight — Netlify creds check
        run: |
          if [ "${HAS_NETLIFY}" != "true" ]; then
            echo "::warning::NETLIFY_AUTH_TOKEN and/or NETLIFY_SITE_ID not configured — exiting early."
            echo "  Get a token: https://app.netlify.com/user/applications"
            echo "  Site id: Netlify dashboard → Site → Settings → General → Site information."
          fi

      - if: env.HAS_NETLIFY == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - if: env.HAS_NETLIFY == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        if: env.HAS_NETLIFY == 'true'
        run: npm ci --no-audit --no-fund

      - name: Test (gate)
        if: env.HAS_NETLIFY == 'true'
        run: npm test -- --run

      - name: Build
        if: env.HAS_NETLIFY == 'true'
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_DEEPSEEK_API_KEY: ${{ secrets.VITE_DEEPSEEK_API_KEY }}
          VITE_LLM_API_KEY: ${{ secrets.VITE_DEEPSEEK_API_KEY }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: |
          if [ -f data/output/seed_hexagrams.json ]; then
            cp data/output/seed_hexagrams.json src/data/seed_hexagrams.json
          fi
          npm run build

      - name: Verify dist/
        if: env.HAS_NETLIFY == 'true'
        run: |
          test -f dist/index.html
          test -f dist/manifest.webmanifest
          ls -lh dist/

      - name: Deploy to Netlify
        if: env.HAS_NETLIFY == 'true'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npx -y netlify@26 deploy \
            --dir=dist \
            --prod \
            --site="$NETLIFY_SITE_ID" \
            --message="current-almanac@${GITHUB_SHA::7}"
